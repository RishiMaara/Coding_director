<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Typing Settings UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Variables matching the 'Serika Dark' theme */
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --caret-color: #e2b714;
            --sub-color: #646669;
            --sub-alt-color: #2c2e31;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
            --error-extra-color: #7e2a33;
            --colorful-error-color: #ca4754;
            --colorful-error-extra-color: #7e2a33;
            --font-family: 'Consolas', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            height: 80vh;
        }

        /* --- Left Column: Text Input --- */
        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .top-bar {
            display: flex;
            gap: 1rem;
        }

        .btn-top {
            background-color: var(--sub-alt-color);
            color: var(--text-color);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: var(--font-family);
            font-size: 1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-top:hover {
            color: var(--text-color);
            background-color: #3e4145;
        }

        textarea {
            flex: 1;
            background-color: transparent;
            border: none;
            color: var(--sub-color);
            font-family: var(--font-family);
            font-size: 1.2rem;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        textarea:focus {
            color: var(--text-color);
        }

        /* --- Right Column: Settings --- */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            padding-right: 1rem;
        }

        /* Custom Scrollbar for right col */
        .right-col::-webkit-scrollbar { width: 8px; }
        .right-col::-webkit-scrollbar-track { background: transparent; }
        .right-col::-webkit-scrollbar-thumb { background: var(--sub-alt-color); border-radius: 4px; }
        .right-col::-webkit-scrollbar-thumb:hover { background: var(--sub-color); }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .setting-header {
            color: var(--sub-color);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .setting-header i {
            color: var(--main-color);
        }

        .setting-desc {
            color: var(--text-color);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            background-color: var(--sub-alt-color);
            border-radius: 0.5rem;
            padding: 0.25rem;
        }

        .btn-option {
            flex: 1;
            background: transparent;
            color: var(--sub-color);
            border: none;
            padding: 0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-family: var(--font-family);
            transition: all 0.2s ease;
        }

        .btn-option:hover {
            color: var(--text-color);
        }

        .btn-option.active {
            background-color: var(--main-color);
            color: var(--bg-color);
            font-weight: bold;
        }

        .btn-action {
            background-color: var(--sub-alt-color);
            color: var(--text-color);
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: var(--font-family);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background-color: #3e4145;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-col">
            <div class="top-bar">
                <button class="btn-top"><i class="fas fa-save"></i> save</button>
                <button class="btn-top"><i class="fas fa-folder"></i> saved texts</button>
            </div>
            <textarea spellcheck="false" id="code-input">
// Find Pair with Given Sum
n = len(arr)
left = 0
right = n - 1
arr.sort()
while left < right:
    curr = arr[left] + arr[right]
    if curr == target:
        return True
    elif curr < target:
        left += 1
    else:
        right -= 1
return False</textarea>
        </div>

        <div class="right-col">
            
            <div class="setting-group">
                <div class="setting-header"><i class="fas fa-cog"></i> mode</div>
                <div class="setting-desc">Change the way words are generated.</div>
                <div class="btn-group option-group">
                    <button class="btn-option active">simple</button>
                    <button class="btn-option">repeat</button>
                    <button class="btn-option">shuffle</button>
                    <button class="btn-option">random</button>
                </div>
            </div>

            <div class="setting-group">
                <div class="setting-header"><i class="fas fa-step-forward"></i> limit</div>
                <div class="setting-desc">Control how many words to generate or for how long you want to type.</div>
                <div class="btn-group option-group">
                    <button class="btn-option">words</button>
                    <button class="btn-option">time</button>
                </div>
            </div>

            <div class="setting-group">
                <div class="setting-header"><i class="fas fa-grip-lines-vertical"></i> word delimiter</div>
                <div class="setting-desc">Change how words are separated. Using the pipe delimiter allows you to randomize groups of words.</div>
                <div class="btn-group option-group">
                    <button class="btn-option">pipe</button>
                    <button class="btn-option active">space</button>
                </div>
            </div>

            <div class="setting-group">
                <button class="btn-action"><i class="fas fa-file-import"></i> open file</button>
                <button class="btn-action"><i class="fas fa-filter"></i> words filter</button>
                <button class="btn-action"><i class="fas fa-cogs"></i> custom generator</button>
            </div>

            <div class="setting-group">
                <div class="setting-header"><i class="fas fa-eraser"></i> remove zero-width characters</div>
                <div class="setting-desc">Fully remove zero-width characters.</div>
                <button class="btn-action">apply</button>
            </div>

        </div>
    </div>

    <script>
        // JavaScript to handle UI interactivity
        document.addEventListener('DOMContentLoaded', () => {
            
            // Logic to toggle active states on setting buttons
            const optionGroups = document.querySelectorAll('.option-group');
            
            optionGroups.forEach(group => {
                const buttons = group.querySelectorAll('.btn-option');
                buttons.forEach(button => {
                    button.addEventListener('click', () => {
                        // Remove active class from all siblings
                        buttons.forEach(btn => btn.classList.remove('active'));
                        // Add active class to clicked button
                        button.classList.add('active');
                    });
                });
            });

            // Auto-focus the text area when the page loads
            document.getElementById('code-input').focus();
        });
    </script>
</body>
</html>
