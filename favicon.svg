<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0d1117"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="26" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <!-- Purple filled circle bg -->
  <circle cx="32" cy="32" r="22" fill="url(#bg_grad)" opacity="0.9"/>
  <!-- Play triangle (director cue) -->
  <polygon points="26,22 26,42 46,32" fill="url(#play_grad)" filter="url(#glow)"/>
  <!-- Top stripe (clapperboard ref) -->
  <rect x="14" y="13" width="36" height="6" rx="3" fill="#7c3aed" opacity="0.7"/>
  <rect x="17" y="13" width="4" height="6" rx="1" fill="#06b6d4" opacity="0.9"/>
  <rect x="25" y="13" width="4" height="6" rx="1" fill="#06b6d4" opacity="0.9"/>
  <rect x="33" y="13" width="4" height="6" rx="1" fill="#06b6d4" opacity="0.9"/>
  <rect x="41" y="13" width="4" height="6" rx="1" fill="#06b6d4" opacity="0.9"/>
  <defs>
    <radialGradient id="bg_grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.9"/>
    </radialGradient>
    <linearGradient id="play_grad" x1="26" y1="22" x2="46" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
